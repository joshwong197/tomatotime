
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tomato Time 🍅</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Outfit:wght@200;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Fredoka', sans-serif;
            background-color: #fefce8;
            color: #422006;
            margin: 0;
            overflow-x: hidden;
        }
        .tomato-card {
            background: #ffffff;
            border: 4px solid #fecaca;
            border-radius: 2.5rem;
            box-shadow: 0 10px 0 0 #fee2e2;
        }
        .tomato-button {
            background: #ef4444;
            color: white;
            border-radius: 9999px;
            box-shadow: 0 4px 0 0 #b91c1c;
            transition: all 0.2s;
        }
        .tomato-button:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 0 #b91c1c;
        }
        .tomato-button-secondary {
            background: #22c55e;
            color: white;
            border-radius: 9999px;
            box-shadow: 0 4px 0 0 #15803d;
            transition: all 0.2s;
        }
        .tomato-button-secondary:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 0 #15803d;
        }
        .tomato-input {
            background: #fff;
            border: 3px solid #fde047;
            border-radius: 2rem;
            color: #422006;
        }
        .tomato-input:focus {
            outline: none;
            border-color: #ef4444;
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #fefce8;
        }
        ::-webkit-scrollbar-thumb {
            background: #fecaca;
            border-radius: 10px;
        }
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(2deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        .floating {
            animation: float 4s ease-in-out infinite;
        }
    </style>
<script type="importmap">
{

  }
}
</script>

</head>

<script type="module" src="/index.tsx"></script>
</body>
</html>
