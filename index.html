
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tomatotime ⚔️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f0f1a;
            color: #e4e4e7;
            margin: 0;
            overflow-x: hidden;
        }
        h1, h2, h3, .font-gothic {
            font-family: 'Cinzel', serif;
        }
        .hunt-card {
            background: #1a1a2e;
            border: 2px solid #4a1c1c;
            border-radius: 1rem;
            box-shadow: 0 4px 20px rgba(139, 0, 0, 0.15);
        }
        .hunt-button {
            background: #8b0000;
            color: #e4e4e7;
            border-radius: 9999px;
            box-shadow: 0 4px 0 0 #4a0000;
            transition: all 0.2s;
        }
        .hunt-button:hover {
            background: #a00000;
            box-shadow: 0 4px 0 0 #4a0000, 0 0 15px rgba(139, 0, 0, 0.4);
        }
        .hunt-button:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 0 #4a0000;
        }
        .hunt-button-secondary {
            background: #1e3a2e;
            color: #a7f3d0;
            border-radius: 9999px;
            box-shadow: 0 4px 0 0 #0f2418;
            transition: all 0.2s;
        }
        .hunt-button-secondary:hover {
            background: #254a3a;
            box-shadow: 0 4px 0 0 #0f2418, 0 0 15px rgba(30, 58, 46, 0.4);
        }
        .hunt-button-secondary:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 0 #0f2418;
        }
        .hunt-input {
            background: #16213e;
            border: 2px solid #374151;
            border-radius: 0.75rem;
            color: #e4e4e7;
        }
        .hunt-input:focus {
            outline: none;
            border-color: #8b0000;
            box-shadow: 0 0 10px rgba(139, 0, 0, 0.2);
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a2e;
        }
        ::-webkit-scrollbar-thumb {
            background: #4a1c1c;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #6b2020;
        }
        @keyframes pulse-glow {
            0%, 100% { filter: drop-shadow(0 0 8px rgba(139, 0, 0, 0.4)); }
            50% { filter: drop-shadow(0 0 20px rgba(139, 0, 0, 0.7)); }
        }
        .pulse-glow {
            animation: pulse-glow 3s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }
        .floating {
            animation: float 4s ease-in-out infinite;
        }
        @keyframes fog-drift {
            0% { opacity: 0.03; transform: translateX(0); }
            50% { opacity: 0.06; transform: translateX(20px); }
            100% { opacity: 0.03; transform: translateX(0); }
        }
        .fog-drift {
            animation: fog-drift 8s ease-in-out infinite;
        }
    </style>
<script type="importmap">

}

</head>

</html>
